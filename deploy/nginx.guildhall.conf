# Sample nginx reverse-proxy for Guildhall.
#
# Place this inside the nginx container on the 'edge' network (e.g. drop it in the
# conf.d/ directory it includes) and reload nginx. The guildhall container must
# share the 'edge' network so the hostname "guildhall" resolves.
#
# Adjust server_name and the TLS cert paths to your setup.

upstream guildhall_upstream {
    # "guildhall" = the compose service/container name on the 'edge' network.
    server guildhall:5000;
}

server {
    listen 80;
    server_name guildhall.example.com;
    # Redirect everything to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name guildhall.example.com;

    ssl_certificate     /etc/nginx/certs/guildhall.crt;
    ssl_certificate_key /etc/nginx/certs/guildhall.key;

    # Passwords are submitted here -- keep it HTTPS-only.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Allow large client/addon downloads (default 1m is far too small to matter
    # for downloads, but uploads/POSTs stay bounded by Flask anyway).
    client_max_body_size 64m;

    location / {
        proxy_pass http://guildhall_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Internal handoff target for /downloads/<file>: the app authenticates the
    # request, then returns X-Accel-Redirect: /protected-downloads/<file> and
    # nginx serves the bytes from disk (sendfile, Range/resume), never tying up a
    # Python worker. Not reachable directly ("internal"). The 'alias' path must
    # be mounted into THIS nginx container, e.g. in its compose service:
    #     volumes:
    #       - /media/plex/downloads:/media/plex/downloads:ro
    # and the app set with GUILDHALL_DOWNLOADS_INTERNAL_PREFIX=/protected-downloads
    location /protected-downloads/ {
        internal;
        alias /media/plex/downloads/;
    }
}
