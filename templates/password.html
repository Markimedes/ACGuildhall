{% extends "base.html" %}
{% block title %}Change password - Guildhall{% endblock %}
{% block content %}
<h1>Change password</h1>
<p class="muted">You can only change your own account's password.</p>
<form method="post" action="{{ url_for('password') }}" class="card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Current password
    <input type="password" name="current_password" autocomplete="current-password" required>
  </label>
  <label>New password
    <input type="password" name="new_password" autocomplete="new-password" maxlength="16" required>
  </label>
  <label>Confirm new password
    <input type="password" name="confirm_password" autocomplete="new-password" maxlength="16" required>
  </label>
  <p class="muted">Maximum 16 characters.</p>
  <button type="submit">Change password</button>
</form>
{% endblock %}
